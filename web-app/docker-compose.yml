services:
  web-app-backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: web-app-backend
    ports:
      - "8080:8080"
    environment:
      - DATABASE_URL=sqlite:///./data/web_app.db  # Changed to match volume mount
      - GEMINI_FIRST_MODEL=${GEMINI_FIRST_MODEL:-}
      - FIRST_MODEL_THINKING_POWER=${FIRST_MODEL_THINKING_POWER:--1}
      - GEMINI_SECOND_MODEL=${GEMINI_SECOND_MODEL:-}
      - SECOND_MODEL_THINKING_POWER=${SECOND_MODEL_THINKING_POWER:--1}
      - SECOND_MODEL_TIMEOUT_SECONDS=${SECOND_MODEL_TIMEOUT_SECONDS:-20}
      - SECOND_MODEL_MAX_ATTEMPTS=${SECOND_MODEL_MAX_ATTEMPTS:-1}
      - FIRST_MODEL_TIMEOUT_SECONDS=${FIRST_MODEL_TIMEOUT_SECONDS:-20}
      - FIRST_MODEL_MAX_ATTEMPTS=${FIRST_MODEL_MAX_ATTEMPTS:-1}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY:-}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - FRONTEND_URL=http://localhost:3000
    volumes:
      - ./backend/data:/app/data  # For SQLite database persistence
      - ./backend/app/assets/annotated_test.json:/app/app/assets/annotated_test.json:ro  # Mount the JSON file for seeding (read-only)
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  web-app-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: web-app-frontend
    ports:
      - "3000:3000"
    environment:
      - REACT_APP_BACKEND_BASE_URL=http://localhost:8080
    depends_on:
      web-app-backend:
        condition: service_healthy

networks:
  default:
    name: web-app-network
